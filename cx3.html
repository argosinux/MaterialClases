<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clase 3 - Customer Journey y momentos de verdad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="secondary-page">
    <main class="page-shell">
      <section class="page-card">
        <p class="eyebrow">Clase 3 - Customer Journey y momentos de verdad</p>

        <div class="slider-shell">
          <h2 id="slideTitle"></h2>
          <div id="slideContent" class="slide-content"></div>
          <div class="slider-nav">
            <button class="section-action-btn" id="prevSlideBtn" type="button" hidden>Anterior</button>
            <button class="section-action-btn" id="nextSlideBtn" type="button">Siguiente</button>
          </div>
        </div>

        <div class="detail-actions">
          <a class="back-link" href="customerexperience.html">← Volver a clases</a>
        </div>
      </section>
    </main>

    <script>
      function initSlider(titleEl, contentEl, prevBtn, nextBtn, slides) {
        let current = 0;

        function render() {
          const slide = slides[current];
          titleEl.textContent = slide.title;
          contentEl.innerHTML = slide.html;
          prevBtn.hidden = current === 0;
          nextBtn.disabled = current === slides.length - 1;
          nextBtn.textContent = current === slides.length - 1 ? 'Final' : 'Siguiente';
        }

        prevBtn.addEventListener('click', () => {
          current = Math.max(0, current - 1);
          render();
        });

        nextBtn.addEventListener('click', () => {
          current = Math.min(slides.length - 1, current + 1);
          render();
        });

        render();
      }

      const slides = [
        {
          title: 'Resumen - Journey Customer',
          html: `
            <div class="image-slide">
              <img src="img/CX_resumenjourney.png" alt="Resumen - Journey Customer" />
            </div>
          `
        },
                {
          title: 'Ejemplo - Journey Customer',
          html: `
            <div class="image-slide">
              <img src="img/CX_ejemplojourney.png" alt="Ejemplo - Journey Customer" />
            </div>
          `
        },
       {
          title: '¿Para qué? - Journey Customer',
          html: `
            <div class="image-slide">
              <img src="img/CX_paraque.png" alt="Para qué - Journey Customer" />
            </div>
          `
        },
        {
          title: 'Cinco pilares - Journey Customer',
          html: `
            <div class="image-slide">
              <img src="img/CX_cincopilares.png" alt="Cinco pilares - Journey Customer" />
            </div>
          `
        },
        {
          title: 'Pain point vs. momento de verdad',
          html: `
            <div class="modal-columns">
              <article class="modal-section">
                <h3>Pain point</h3>
                <p>
                  Es una fricción puntual. Puede molestar, demorar o frustrar.
                </p>
              </article>

              <article class="modal-section">
                <h3>Momento de verdad</h3>
                <p>
                  Es un punto de alta carga emocional o decisional. Puede cambiar la relación con la marca.
                </p>
              </article>
            </div>

            <section class="modal-section">
              <h3>Ejemplo ampliado</h3>
              <p>
                En una aerolínea:
              </p>
              <p>
                <strong>Pain point:</strong> la app tarda en cargar el boarding pass.
              </p>
              <p>
                <strong>Momento de verdad:</strong> el cliente está en la fila, faltan 10 minutos para cerrar el embarque y no puede mostrar su boarding pass.
              </p>
              <p class="example-text">
                La misma falla técnica se convierte en momento de verdad cuando aparece urgencia, riesgo y emoción.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                No todo pain point es un momento de verdad.
              </p>
              <p>
                Pero todo momento de verdad mal gestionado puede convertirse en pérdida de confianza.
              </p>
            </section>
          `
        },
        {
          title: 'La línea emocional como evidencia del viaje',
          html: `
            <section class="modal-section">
              <p>
                La emoción no debe ponerse “a ojo”. Debe inferirse desde evidencia:
              </p>
              <ul>
                <li>Comentarios de clientes.
                <li>Reclamos.
                <li>Entrevistas.
                <li>Tiempo de espera.
                <li>Abandono en una etapa.
                <li>Repetición de consultas.
                <li>Reseñas negativas.
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                La línea emocional no es arte abstracto. Es una hipótesis visual basada en señales.
              </p>
            </section>

            <section class="modal-section">
              <h3>Ejemplo para explicar</h3>
              <p>
                Si muchos usuarios abandonan al cargar documentación, escriben a soporte y dejan comentarios como “no sé si esto está bien”, la emoción probable no es “neutral”. Es ansiedad o inseguridad.
              </p>
            </section>
          `
        },
        {
          title: 'Por qué el Journey Map debe ser colaborativo',
          html: `
            <section class="modal-section">
              <h3>Silos organizacionales</h3>
              <p>
                El cliente vive una sola experiencia, pero la empresa suele operar por silos. Marketing, Producto, Operaciones, Soporte y Finanzas pueden tener objetivos distintos, métricas distintas y hasta versiones distintas de “lo que pasa”.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                El Journey Map colaborativo no busca que todos opinen. Busca que todos vean el mismo viaje.
              </p>
            </section>

            <section class="modal-section">
              <h3>Ejemplo</h3>
              <ul>
                <li>Marketing cree que el problema está en la landing.
                <li>Ventas cree que el problema es el precio.
                <li>Soporte sabe que la mayor queja es el acceso posterior a la compra.
                <li>Operaciones sabe que hay demoras en activación.
              </ul>
            </section>
          `
        },
        {
          title: 'Miro como tablero de diagnóstico, no como mural bonito',
          html: `
            <section class="modal-section">
              <p>
                La herramienta tiene que organizar el pensamiento. Por eso conviene dividir el tablero en cinco zonas:
              </p>
              <ul>
                <li><strong>1. Contexto.</strong> Buyer Persona, objetivo del viaje y escenario.
                <li><strong>2. Journey Map.</strong> Etapas, acciones, touchpoints, emociones, pain points y momentos de verdad.
                <li><strong>3. Evidencias.</strong> Capturas, citas, métricas, reseñas, tickets, resultados de encuestas.
                <li><strong>4. Dudas abiertas.</strong> Lo que todavía debe investigarse.
                <li><strong>5. Priorización.</strong> Fricciones candidatas para trabajar.
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Si el tablero no permite tomar decisiones, es diseño de interiores digital. Muy lindo, pero no paga la cuenta.
              </p>
            </section>
          `
        },
                {
          title: 'Técnica: divergencia y convergencia',
          html: `
            <div class="image-slide">
              <img src="img/CX_tecnicas.png" alt="Técnica: divergencia y convergencia" />
            </div>
          `
        },
        {
          title: 'Cómo evitar que el mapa sea una suma de opiniones',
          html: `
            <section class="modal-section">
              <p>
                Todo pain point debe tener al menos una de estas tres bases:
              </p>
              <ul>
                <li><strong>Evidencia directa.</strong> Comentarios, entrevistas, encuestas, reseñas.
                <li><strong>Evidencia indirecta.</strong> Abandono, tiempos, clics, tickets, tasa de error.
                <li><strong>Hipótesis explícita.</strong> Algo que todavía no se validó, pero que se marca como supuesto.
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                No todas las opiniones son evidencia.
              </p>
              <p>
                Pero toda opinión útil puede convertirse en hipótesis investigable.
              </p>
            </section>
          `
        },
        {
          title: 'Fricción vs. deleite: el giro conceptual',
          html: `
            <section class="modal-section">
              <p>
                Durante años el objetivo declarado del CX fue "sorprender" al cliente. La investigación de Dixon, Toman y DeLisi (The Effortless Experience, sobre 97.000 clientes) muestra lo contrario: superar expectativas casi no aumenta la lealtad, pero el alto esfuerzo la destruye. El 96% de los clientes con una interacción de alto esfuerzo se vuelven desleales, contra solo el 9% de los que tuvieron baja fricción.
              </p>
            </section>

            <section class="modal-section">
              <h3>Ejemplo</h3>
              <p class="example-text">
                Una aerolínea le regala millas extra a un pasajero por una demora (gesto de "deleite"), pero ese mismo pasajero tuvo que llamar tres veces para reprogramar su vuelo. El regalo no compensa el esfuerzo: el pasajero igual califica mal la experiencia y es candidato a cambiar de aerolínea.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                La lealtad no se construye deleitando, se construye eliminando fricción.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta</h3>
              <p>
                ¿Qué ejemplo tienen de una empresa que "los sorprendió" pero igual dejaron de usarla por lo difícil que era resolver un problema?
              </p>
            </section>
          `
        },
               {
          title: 'Fricciones',
          html: `
            <div class="image-slide">
              <img src="img/CX_fricciones.png" alt="Fricciones " />
            </div>
          `
        },
        {
          title: 'Las cinco fuentes de esfuerzo',
          html: `
            <section class="modal-section">
              <p>
                Dixon identifica cinco fuentes típicas de alto esfuerzo: cambio de canal, contactos repetidos, servicio genérico, advertencias innecesarias y escalaciones difíciles. Cada una de estas fuentes es un problema de diseño de proceso, no de habilidad del agente.
              </p>
            </section>

            <section class="modal-section">
              <h3>Ejemplo</h3>
              <p class="example-text">
                Una compañía de seguros registra correctamente un reclamo, pero nadie le informa al cliente qué documentación falta. El cliente vuelve a llamar cinco días después preguntando por qué no avanza su trámite: es un contacto repetido causado por un proceso incompleto, no por un mal agente.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                La fricción se resuelve rediseñando el proceso, no capacitando mejor a la persona.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta</h3>
              <p>
                En un proceso que conozcan bien (bancario, delivery, soporte técnico), ¿cuál de estas cinco fuentes de esfuerzo aparece con más frecuencia?
              </p>
            </section>
          `
        },
        {
          title: 'Touchpoint vs. momento de la verdad',
          html: `
            <section class="modal-section">
              <p>
                Jan Carlzon (ex-CEO de SAS) definió "momento de la verdad" como cualquier instancia en la que el cliente forma una impresión sobre la empresa. Un touchpoint es una interacción puntual; un momento de la verdad es el episodio completo. No todos los momentos pesan igual: la organización debe priorizar unos pocos episodios críticos.
              </p>
            </section>

            <section class="modal-section">
              <h3>Ejemplo</h3>
              <p class="example-text">
                En una empresa de delivery, el touchpoint es la notificación push de "tu pedido está en camino". El momento de la verdad real es todo el episodio de "algo salió mal con mi pedido": desde que el cliente nota el problema, pasando por el contacto con soporte, hasta que el reembolso o reposición se acredita. Rediseñar solo la notificación no alcanza si el episodio completo sigue siendo tedioso.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Se rediseñan episodios completos, no touchpoints aislados.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta</h3>
              <p>
                En el journey que armaron en su pre-entrega, ¿qué touchpoint individual en realidad forma parte de un momento de la verdad más amplio que no estaban viendo?
              </p>
            </section>
          `
        },
               {
          title: 'Metodología del diagnóstico',
          html: `
            <div class="image-slide">
              <img src="img/CX_metodologia.png" alt="Metodología del diagnóstico" />
            </div>
          `
        },
                       {
          title: 'Principios del rediseño',
          html: `
            <div class="image-slide">
              <img src="img/CX_rediceno.png" alt="Principios del rediseño" />
            </div>
          `
        },
                               {
          title: 'Fricciones - resumen',
          html: `
            <div class="image-slide">
              <img src="img/CX_friccionesresumen.png" alt="Fricciones resumen" />
            </div>
          `
        },
        {
          title: 'El Customer Journey Map As-Is',
          html: `
            <section class="modal-section">
              <h3>Profundización</h3>
              <p>
                El entregable es del estado actual, no del estado ideal.
              </p>
              <p>
                El documento del curso pide un archivo PDF o imagen de alta resolución con el Customer Journey Map del estado actual, incluyendo etapas, touchpoints, fricciones y momentos de verdad.
              </p>
              <p>
                También aclara que debe reflejar la realidad actual, incluso si resulta dolorosa.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                El As-Is no se maquilla.
              </p>
              <p>
                Se diagnostica.
              </p>
            </section>

            <section class="modal-section">
              <h3>Error común</h3>
              <p>
                Presentar un mapa idealizado donde todo fluye. Eso sirve para vender humo, no para mejorar CX.
              </p>
              <p class="example-text">
                Y el humo, como en las viejas oficinas, termina activando la alarma.
              </p>
            </section>
          `
        },
        {
          title: 'Del mapa a la narrativa ejecutiva',
          html: `
            <section class="modal-section">
              <h3>Profundización</h3>
              <p>
                Un buen mapa necesita una buena defensa. La defensa debe contar una historia:
              </p>
              <ul>
                <li>Quién es el cliente.
                <li>Qué intenta lograr.
                <li>Qué recorrido sigue.
                <li>Dónde aparece la fricción.
                <li>Qué momento define la experiencia.
                <li>Qué evidencia lo respalda.
                <li>Qué impacto tiene.
                <li>Qué conviene priorizar.
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                No se defiende el diseño del mapa.
              </p>
              <p>
                Se defiende el diagnóstico.
              </p>
            </section>

            <section class="modal-section">
              <h3>Ejemplo de frase ejecutiva</h3>
              <p class="example-text">
                “El principal problema no está en la inscripción, sino en la primera activación: el cliente ya pagó, pero todavía no siente que empezó. Ese vacío genera ansiedad, consultas a soporte y riesgo de abandono temprano.”
              </p>
            </section>
          `
        },
        {
          title: 'Criterios de calidad del mapa',
          html: `
            <section class="modal-section">
              <h3>Profundización basada en rúbrica</h3>
              <p>
                El documento del curso prioriza que el mapa tenga estructura completa, fricciones y momentos de verdad bien identificados, coherencia con la Buyer Persona, secuencia lógica, línea emocional clara y legibilidad del archivo.
              </p>
            </section>

            <section class="modal-section">
              <h3>Checklist mejorado</h3>
              <ul>
                <li>¿El mapa tiene una Buyer Persona visible?
                <li>¿El escenario es específico?
                <li>¿Las etapas siguen una lógica temporal?
                <li>¿Las acciones están escritas desde el cliente?
                <li>¿Los touchpoints están diferenciados?
                <li>¿La línea emocional tiene sentido?
                <li>¿Los pain points vienen de investigación previa?
                <li>¿Hay al menos dos momentos de verdad?
                <li>¿Se entiende qué habría que mejorar primero?
                <li>¿El archivo exportado se lee sin hacer zoom heroico?
              </ul>
            </section>
          `
        },
                                       {
          title: '¿Cómo responder preguntas difíciles?',
          html: `
            <div class="image-slide">
              <img src="img/CX_preguntas.png" alt="Fricciones resumen" />
            </div>
          `
        },
        {
          title: 'Puente al Módulo 4: del Journey al Service Blueprint',
          html: `
            <section class="modal-section">
              <h3>Profundización final</h3>
              <p>
                El Journey Map muestra la experiencia visible del cliente.
              </p>
              <p>
                El Service Blueprint, que se trabaja después, conecta esa experiencia con procesos internos, personas, sistemas y backstage.
              </p>
              <p>
                Es un diagrama que visualiza relaciones entre componentes del servicio, incluyendo personas, herramientas, procesos y evidencias.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Módulo 3 responde: ¿Qué vive el cliente?
              </p>
              <p>
                Módulo 4 responderá: ¿Qué debe pasar dentro de la organización para sostener o rediseñar esa experiencia?
              </p>
            </section>

            <section class="modal-section">
              <h3>Cierre sugerido</h3>
              <p class="example-text">
                El Journey Map encuentra la herida.
              </p>
              <p class="example-text">
                El Blueprint muestra qué músculo, proceso o sistema hay que mover para curarla.
              </p>
            </section>
          `
        },
      ];

      initSlider(
        document.getElementById('slideTitle'),
        document.getElementById('slideContent'),
        document.getElementById('prevSlideBtn'),
        document.getElementById('nextSlideBtn'),
        slides
      );
    </script>
  </body>
</html>
