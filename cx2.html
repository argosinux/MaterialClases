<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clase 2 - Entendiendo al cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="secondary-page">
    <main class="page-shell">
      <section class="page-card">
        <p class="eyebrow">Clase 2 - Entendiendo al cliente</p>

        <div class="slider-shell">
          <h2 id="slideTitle"></h2>
          <div id="slideContent" class="slide-content"></div>
          <div class="slider-nav">
            <button class="section-action-btn" id="prevSlideBtn" type="button" hidden>Anterior</button>
            <button class="section-action-btn" id="nextSlideBtn" type="button">Siguiente</button>
          </div>
        </div>

        <div class="detail-actions">
          <a class="back-link" href="customerexperience.html">← Volver a clases</a>
        </div>
      </section>
    </main>

    <script>
      function initSlider(titleEl, contentEl, prevBtn, nextBtn, slides) {
        let current = 0;

        function render() {
          const slide = slides[current];
          titleEl.textContent = slide.title;
          contentEl.innerHTML = slide.html;
          prevBtn.hidden = current === 0;
          nextBtn.disabled = current === slides.length - 1;
          nextBtn.textContent = current === slides.length - 1 ? 'Final' : 'Siguiente';
        }

        prevBtn.addEventListener('click', () => {
          current = Math.max(0, current - 1);
          render();
        });

        nextBtn.addEventListener('click', () => {
          current = Math.min(slides.length - 1, current + 1);
          render();
        });

        render();
      }

      const slides = [
        {
          title: 'El cliente deja pistas, pero no siempre deja respuestas',
          html: `
            <div class="image-slide">
              <img src="img/CX_2_Actividad.png" alt="El cliente deja pistas, pero no siempre deja respuestas" />
            </div>
          `
        },
        {
          title: 'Qué, dónde y por qué',
          html: `
            <section class="modal-section">
               <p>
                Para comprender un problema de experiencia necesitamos tres piezas:
                </p>
            </section>

            <div class="modal-columns">
              <article class="modal-section">
                <p>
                  <strong>Qué ocurre.</strong> La métrica o síntoma visible. Ejemplo: bajaron las ventas, subió el churn, cayó el NPS.
                </p>
              </article>

              <article class="modal-section">
                <p>
                  <strong>Dónde ocurre.</strong> El momento, canal o etapa del journey donde aparece el problema. Ejemplo: carrito, onboarding, atención postventa, renovación.
                </p>
              </article>
              
              <article class="modal-section">
                <p>
                  <strong>Por qué ocurre.</strong> La causa real desde la perspectiva del cliente. Ejemplo: no entiende el costo final, desconfía del medio de pago, siente que el proceso es largo.
                </p>
              </article>
            </div>
            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Sin el “por qué”, cualquier mejora es una apuesta.
              </p>
              <p>
                El qué y el dónde orientan la mirada. El porqué orienta la decisión.
              </p>
            </section>
            <section class="modal-section highlight-quote">
              <h3>Pregunta</h3>
              <p>
                ¿Qué decisiones se toman mal en una empresa cuando solo se mira el “qué” y no el “por qué”?
              </p>
            </section>

          `
        },
        {
          title: 'Dos lentes para mirar al cliente',
          html: `

            <div class="modal-columns">
              <article class="modal-section">
                <h3>Investigación cuantitativa</h3>
                <ul>
                  <li>¿Cuánto?
                  <li>¿Cuántos?
                  <li>¿Con qué frecuencia?
                  <li>¿Qué porcentaje?
                </ul>
                <p> Sirve para medir, comparar y dimensionar.
                  </p>
                  <p>
                  <p class="example-text">Ejemplo: aplicar un NPS a 5.000 clientes.
                    </p>
              </article>

              <article class="modal-section">
                <h3>Investigación cualitativa</h3>
                <ul>
                  <li>¿Por qué?
                  <li>¿Cómo lo vivió?
                  <li>¿Qué sintió?
                  <li> ¿Qué esperaba?
                </ul>
                <p> 
                  Sirve para explorar, entender y descubrir causas.
                  </p>
                  <p>
                  <p class="example-text">Ejemplo: entrevistar a 10 clientes que abandonaron una compra.
                    </p>
              </article>
            </div>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
              Lo cuantitativo te dice dónde mirar. Lo cualitativo te dice qué arreglar.
              </p>
            </section>
            <section class="modal-section highlight-quote">
              <h3>Pregunta</h3>
              <p>
                Si el 40% abandona el checkout, ¿qué tipo de investigación harías primero para entender el motivo?

              </p>
            </section>
          `
        },
        {
          title: 'Lo que el cliente dice vs. lo que el cliente hace',
          html: `

            <div class="modal-columns">
              <article class="modal-section">
                <h3>Fuentes directas</h3>
                <p>
                  El cliente entrega feedback de forma consciente. Ejemplos:
                </p>
                <ul>
                  <li>Encuestas
                  <li>Entrevistas
                  <li>Reclamos
                  <li>Reseñas
                  <li> Comentarios en redes
                </ul>
              </article>

              <article class="modal-section">
                <h3>Fuentes indirectas</h3>
                <p>
                  El cliente no opina, pero su comportamiento deja señales.
                </p>
                <ul>
                  <li>Historial de compras
                  <li>Abandono de carrito
                  <li>Mapas de calor
                  <li>Frecuencia de uso
                  <li>Tickets de soporte
                  <li>Analítica web
                </ul>
                <p> 
                  Lo que el cliente dice y lo que hace no siempre coincide.
                </p>
                  <p>
                  <p class="example-text">¿Qué fuente confiarías más para detectar una fricción: una encuesta o el comportamiento real? ¿Por qué?

                    </p>
              </article>
            </div>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
              Lo cuantitativo te dice dónde mirar. Lo cualitativo te dice qué arreglar.
              </p>
            </section>
            <section class="modal-section highlight-quote">
              <h3>Pregunta</h3>
              <p>
                Si el 40% abandona el checkout, ¿qué tipo de investigación harías primero para entender el motivo?

              </p>
            </section>
          `
        },
       {
          title: 'Saber quién compra no alcanza',
          html: `
            <div class="image-slide">
              <img src="img/cx_cliente.png" alt="Buyer" />
            </div>
          `
        },
        {
          title: 'Segmento Vs Buyer Persona',
          html: `
            <div class="image-slide">
              <img src="img/buyer.png" alt="Buyer" />
            </div>
          `
        },
        {
          title: 'Buyer Persona dinámica',
          html: `
               <p>
                Un Buyer Persona útil no es un documento decorativo.
                </p>

            <div class="modal-columns">
              <article class="modal-section">
                <p>
                  <strong>Basado en evidencia.</strong> No nace de la imaginación del equipo. Se construye con entrevistas, datos, soporte, ventas, comportamiento y feedback.
                </p>
              </article>

              <article class="modal-section">
                <p>
                  <strong>Dinámico.</strong> Se actualiza cuando cambian los hábitos, el mercado o las expectativas.
                </p>
              </article>
              
              <article class="modal-section">
                <p>
                  <strong>Accionable.</strong> Debe ayudar a decidir mensajes, canales, funcionalidades, procesos y prioridades.
                </p>
              </article>
            </div>
            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Muchas empresas hacen personas una vez al año, las ponen en una presentación bonita y luego nadie las vuelve a mirar. Eso no sirve. 
              </p>
              <p>
                Una buena persona debe vivir en las decisiones cotidianas: qué campaña lanzamos, qué dolor resolvemos primero, qué objeción respondemos, qué canal usamos.
              </p>
            </section>
            <section class="modal-section highlight-quote">
              <h3>Pregunta</h3>
              <p>
                ¿Qué dato sobre un cliente te ayudaría a cambiar un mensaje comercial?
              </p>
            </section>

          `
        },
                {
          title: 'Los datos que sí importan',
          html: `
               <p>
                Para construir un perfil accionable, necesitamos entender:
                </p>

            <div class="modal-columns">
              <article class="modal-section">
                <p>
                  <strong>Metas y objetivos.</strong> ¿Qué quiere lograr el cliente?
                </p>
              </article>

              <article class="modal-section">
                <p>
                  <strong>Dolores o pain points.</strong> ¿Qué le genera frustración, esfuerzo o pérdida.?
                </p>
              </article>
              
              <article class="modal-section">
                <p>
                  <strong>Barreras y objeciones.</strong> ¿Qué lo frena antes de comprar o continuar.?
                </p>
              </article>
              <article class="modal-section">
                <p>
                  <strong>Criterios de decisión. </strong> ¿Qué compara para elegir?
                </p>
              </article>
              <article class="modal-section">
                <p>
                  <strong>Fuentes de información. </strong> ¿Dónde aprende, a quién escucha y en quién confía.?
                </p>
              </article>
            </div>
            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
              Un dato sirve si ayuda a decidir.
              </p>
              <p>
                Dato poco útil: “A Valeria le gusta el café”.
              </p>
              <p>
                Dato útil: “Valeria necesita reducir tareas manuales porque su equipo pierde 6 horas semanales armando reportes”.
              </p>
            </section>
            <section class="modal-section highlight-quote">
              <h3>Pregunta</h3>
              <p>
              ¿Qué dato sobre un cliente te ayudaría a cambiar un mensaje comercial?
              </p>
            </section>

          `
        },
        {
          title: 'Jobs to be Done: el trabajo real del producto',
          html: `
            <div class="image-slide">
              <img src="img/cx_Jobs.png" alt="Buyer" />
            </div>
          `
        },
                 {
          title: 'Actividad',
          html: `
            <div class="image-slide">
              <img src="img/CX_2_Actividad2.png" alt="El cliente deja pistas, pero no siempre deja respuestas" />
            </div>
          `
        }
      ];

      initSlider(
        document.getElementById('slideTitle'),
        document.getElementById('slideContent'),
        document.getElementById('prevSlideBtn'),
        document.getElementById('nextSlideBtn'),
        slides
      );
    </script>
  </body>
</html>
