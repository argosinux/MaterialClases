<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estación 1 - Hacer Agile vs. Ser Ágil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="secondary-page">
    <main class="page-shell">
      <section class="page-card">
        <p class="eyebrow">Estación 1</p>
        <h1>Hacer Agile vs. Ser Ágil</h1>

        <div class="slider-shell">
          <h2 id="slideTitle">El Manifiesto no inventó nada</h2>
          <div id="slideContent" class="slide-content"></div>
          <div class="slider-nav">
            <button class="section-action-btn" id="prevSlideBtn" type="button" hidden>Anterior</button>
            <button class="section-action-btn" id="nextSlideBtn" type="button">Siguiente</button>
            <button class="section-action-btn" id="activityBtn" type="button" hidden>Actividad</button>
          </div>
        </div>

        <div class="detail-actions">
          <a class="back-link" href="metodologias-agiles.html">← Volver a clases</a>
        </div>
      </section>
    </main>

    <script>
      const slideTitle = document.getElementById('slideTitle');
      const slideContent = document.getElementById('slideContent');
      const prevSlideBtn = document.getElementById('prevSlideBtn');
      const nextSlideBtn = document.getElementById('nextSlideBtn');
      const activityBtn = document.getElementById('activityBtn');
      let currentSlide = 0;

      const slides = [
        {
          title: '¡Cumplimos todo! Pero, fracasamos igual.',
          html: `
            <section class="modal-section">
              <p>
                Un proyecto entrega a tiempo, dentro del presupuesto, con cada requerimiento firmado implementado. Todos los indicadores en verde. Seis meses después, nadie usa el producto.
              </p>
              <p>
                En 2015 el Standish Group cambió la definición de "proyecto exitoso": reemplazó <strong>cumplir el alcance</strong> por <strong>valor percibido por el cliente</strong>.</p>
                <p>La tasa de éxito de la industria cayó siete puntos de inmediato. No cambió la realidad. Cambió la vara.</p>
              </p>
              <p>
                Hacer Agile es adoptar la mecánica. Ser ágil es adoptar la mentalidad que le da sentido.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Cumplir con el alcance y entregar valor son dos cosas distintas. 
              </p>
              <p>
                CLa segunda es la que decide si el proyecto sirvió.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Qué proyecto conocen que haya cumplido todos sus compromisos y aun así haya fracasado?
              </p>
            </section>
          `
        },
        {
          title: 'Waterfall no fue un error: fue un préstamo mal aplicado',
          html: `
            <section class="modal-section">
              <p>
                Cascada viene de la construcción civil y la manufactura. Es una lógica impecable para un puente: la física no cambia de opinión a mitad del proyecto.
              </p>
              <p>
                El software rompe tres supuestos.
              </p>
              <ul>
                <li>Es intangible: el cliente no sabe qué quiere hasta que lo ve.
                <li>El contexto se mueve: mercado, competencia y tecnología cambian mientras el equipo sigue el plan.
                <li>La integración queda para el final: los riesgos significativos se descubren en la última etapa, cuando ya es demasiado tarde para manejarlos.
              </ul>
              <p>
                Snowbird, Utah, febrero de 2001. Diecisiete personas <strong>no fueron a inventar un método</strong>. Fueron a destilar qué tenían en común las formas de trabajo que ya funcionaban.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                El Manifiesto Ágil no es una doctrina que hay que creer, es un hallazgo empírico: una observación sobre qué pasaba cuando los proyectos salían bien.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿En qué parte de su trabajo siguen operando con supuestos de puente sobre un problema de software?
              </p>
            </section>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/waterfall.png" alt="Imagen waterfall.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/waterfalleje.png" alt="Imagen waterfalleje.png" />
            </div>
          `
        },
        {
          title: 'Los cuatro valores: un algoritmo de desempate',
          html: `
            <section class="modal-section">
              <blockquote class="manifesto-quote">
                Individuos e interacciones <strong>sobre</strong> procesos y herramientas<br />
                Software funcionando <strong>sobre</strong> documentación exhaustiva<br />
                Colaboración con el cliente <strong>sobre</strong> negociación contractual<br />
                Respuesta ante el cambio <strong>sobre</strong> seguir un plan
              </blockquote>
              <p>
                La palabra clave no es lo que está a la izquierda. Es <strong>"sobre"</strong>. No dice "en lugar de": lo de la derecha sigue teniendo valor, pero cuando hay conflicto, gana lo de la izquierda.
              </p>
              <p>
                El Chaos Report encontró que los tres factores que más correlacionan con el éxito son humanos <strong>buen equipo, buen sponsor, entorno cultural adecuado</strong> y que las habilidades técnicas, el herramental y la completitud de los requerimientos son malos predictores. Si solo se pudiera mejorar una cosa: <strong>la latencia de decisión</strong>.
              </p>
              <p>
                Un plan es una hipótesis construida con la peor información que vamos a tener: la del día uno.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                El Manifiesto no es una lista de cosas buenas. Es una regla de decisión para cuando dos cosas buenas entran en conflicto.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Cuál de los cuatro valores es el más difícil de sostener en su organización?.
              </p>
            </section>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/principios.png" alt="Imagen principios.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/spotify.png" alt="Imagen spotify.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/scrum.png" alt="Imagen scrum.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/producto.png" alt="Imagen producto.png" />
            </div>
          `
        },
        {
          title: 'Enamorarse del problema, no de la solución',
          html: `
            <section class="modal-section">
              <p>
                Un <strong>problema</strong> es una brecha entre la situación actual y la deseada. Una <strong>solución</strong> es apenas un medio para cerrarla.
              </p>
              <ul>
                <li> <em>Problema:</em> los directores de proyecto pierden 4 horas por semana consolidando datos manuales.
                <li> <em>Solución:</em> un workspace en Notion con bases de datos relacionadas.
              </ul>
              <p>
                Si se enamoran del workspace, van a defenderlo. Y al defenderlo dejan de ver otras cinco maneras de recuperar esas cuatro horas.
              </p>
              <p>
                <strong>El problema es estable; la solución es descartable.</strong> Las cuatro horas perdidas van a seguir existiendo en 2030. Notion quizás no.
              </p>
              <p>
                <strong>¿Duele lo suficiente?</strong> Proyecten el problema: <em>¿qué pasa si no lo resolvemos en los próximos 90 días?</em> ¿Perdemos clientes? ¿Suben los costos? ¿Aparece riesgo legal? ¿Se quema el equipo? Si la respuesta honesta es "nada grave", no es prioritario.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Decir "esto no duele lo suficiente" es una de las cosas más valiosas que puede hacer un profesional de producto: libera capacidad para el problema que sí duele.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                De todo lo que tienen hoy en el backlog (lista de tareas pendientes), ¿qué pasaría realmente si no se hiciera nada en 90 días?
              </p>
            </section>
          `
        },
                {
          title: 'Tres actores, tres conversaciones distintas',
          html: `
            <section class="modal-section">
                <ul>
                    <li><em>Usuario final </em>— interactúa con la herramienta (un desarrollador usando Jira). Busca facilidad y rapidez.
                    <li> <em>Comprador / sponsor</em> — aprueba el presupuesto (el CTO). Busca ROI y eficiencia.
                    <li><em>Stakeholder</em> — es afectado por el producto (el área de Seguridad). Busca cumplimiento y bajo riesgo.
              </ul>
              <p> <em>Caso SLACK</em>  
                </p>
    
             <ul>
                    <li><em>Para el usuario:</em> Menos correos y gifs divertidos.
                    <li<em>Para el comprador:</em> centralización del conocimiento organizacional y reducción de silos". Misma herramienta, dos productos narrados a dos públicos.
              </ul>
   
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                La propuesta de valor tiene que sobrevivir a las dos conversaciones: la del que usa y la del que firma.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿El que decide es el que usa?  ¿quién está escribiendo su backlog?
              </p>
            </section>
          `
        },
               {
          title: 'Jobs To Be Done: la gente no compra, contrata',
          html: `
            <section class="modal-section">
                <p>Las personas no compran productos: los contratan para hacer un trabajo específico en sus vidas.</p>
                <p>"La gente no quiere un taladro de un cuarto de pulgada; quiere un agujero de un cuarto de pulgada."</p>
                <ul>
                    <li><em>Pains:</em> lo que molesta antes, durante o después del trabajo ("tarda mucho", "no se entiende")
                    <li> <em>Gains</em>  resultados esperados o sorprendentes ("se integra con mi calendario sin que yo haga nada"
              </ul>
   
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Los pains se descubren observando; los gains se descubren imaginando. Por eso los pains son más confiables como base de priorización.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Para qué trabajo los contrató a ustedes su último cliente? ¿Y qué otra cosa podría haber contratado en su lugar?
              </p>
            </section>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/propuestavalor.png" alt="Imagen propuestavalor.png" />
            </div>
          `
        },
        {
          title: 'Del supuesto a la evidencia',
          html: `
            <section class="modal-section">
                <p>Los cuatro riesgos</p>
                <ul>
                    <li><em>Valor:</em> ¿lo van a comprar o elegir usar?
                    <li><em>Usabilidad:</em> ¿van a entender cómo se usa?
                    <li><em>Factibilidad:</em> ¿podemos construirlo con el tiempo, las habilidades y la tecnología que tenemos?
                    <li><em>Viabilidad de negocio:</em>¿funciona para ventas, marketing, finanzas y legales?
                </ul>
                <p><em>Señales</em></p>
                 <ul>
                    <li><em>Cualitativas:</em> explica el porqué - entrevistas, tickets, quejas recurrentes, observación directa.
                    <li><em>Cuantitativas:</em> mide el cuánto - métricas de uso, abandono, tiempo por tarea, tasa de errore
                </ul>
            </section>
            <section class="modal-section highlight-quote">
              <h3>La hipótesis</h3>
              <p>
                Creemos que [segmento] tiene el problema de [problema]. Si les entregamos [propuesta de valor], observaremos [métrica de éxito].
            </p>
            </section>
            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                En Scrum, el Product Owner usa la propuesta de valor como brújula para priorizar el Backlog: si una tarea no aporta a la propuesta de valor, probablemente no debería estar en el Sprint.              </p>
            </section>
          `
        },
                {
          html: `
            <div class="image-slide">
              <img src="img/discovery.png" alt="Imagen discovery.png" />
            </div>
          `
        },
      {
          html: `
            <div class="image-slide">
              <img src="img/proyecto.png" alt="Imagen proyecto.png" />
            </div>
          `
        },
         {
          html: `
            <div class="image-slide">
              <img src="img/ultima.png" alt="Imagen ultima.png" />
            </div>
          `
        }
      ];

      function renderSlide() {
        const slide = slides[currentSlide];
        slideTitle.textContent = slide.title;
        slideContent.innerHTML = slide.html;
        prevSlideBtn.hidden = currentSlide === 0;
        nextSlideBtn.disabled = currentSlide === slides.length - 1;
        nextSlideBtn.textContent = currentSlide === slides.length - 1 ? 'Final' : 'Siguiente';
        activityBtn.hidden = currentSlide !== slides.length - 1;
      }

      prevSlideBtn.addEventListener('click', () => {
        currentSlide = Math.max(0, currentSlide - 1);
        renderSlide();
      });

      nextSlideBtn.addEventListener('click', () => {
        currentSlide = Math.min(slides.length - 1, currentSlide + 1);
        renderSlide();
      });

      activityBtn.addEventListener('click', () => {
        window.location.href = 'https://miro.com/app/board/uXjVH6syhgc=/';
      });

      renderSlide();
    </script>
  </body>
</html>
