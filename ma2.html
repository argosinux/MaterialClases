<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roles - Scrum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="secondary-page">
    <main class="page-shell">
      <section class="page-card">
        <p class="eyebrow">Clase 2</p>
        <h1>Roles - Scrum</h1>

        <div class="slider-shell">
          <h2 id="slideTitle">De roles a accountabilities</h2>
          <div id="slideContent" class="slide-content"></div>
          <div class="slider-nav">
            <button class="section-action-btn" id="prevSlideBtn" type="button" hidden>Anterior</button>
            <button class="section-action-btn" id="nextSlideBtn" type="button">Siguiente</button>
            <button class="section-action-btn" id="activityBtn" type="button" hidden>Actividad</button>
          </div>
        </div>

        <div class="detail-actions">
          <a class="back-link" href="metodologias-agiles.html">← Volver a clases</a>
        </div>
      </section>
    </main>

    <script>
      const slideTitle = document.getElementById('slideTitle');
      const slideContent = document.getElementById('slideContent');
      const prevSlideBtn = document.getElementById('prevSlideBtn');
      const nextSlideBtn = document.getElementById('nextSlideBtn');
      const activityBtn = document.getElementById('activityBtn');
      let currentSlide = 0;

      const slides = [
        {
          title: 'De roles a accountabilities',
          html: `
            <section class="modal-section">
              <ul>
                <li>Scrum Guide 2020: "roles" → "accountabilities"</li>
                <li>No es un título de puesto, es lo que cada persona garantiza</li>
                <li>Scrum Team = unidad autogestionada, sin sub-equipos ni jerarquías</li>
                <li>Deciden internamente quién hace qué, cuándo y cómo</li>
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                El cambio de palabra no es cosmético: pone el foco en la propiedad del resultado, no en el organigrama.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Qué diferencia hay entre tener un título y tener una accountability?
              </p>
            </section>
          `
        },
        {
          title: 'Product Owner: el guardián del valor',
          html: `
            <section class="modal-section">
              <ul>
                <li>No es "tomador de pedidos" ni jefe del equipo técnico</li>
                <li>Misión: maximizar el valor del producto</li>
                <li>Responsable único de ordenar el Product Backlog</li>
                <li>Un buen PO sabe decir que NO</li>
              </ul>
              <p>
                <em>Ejemplo:</em> App de delivery — el equipo quiere mejorar el buscador, el PO prioriza simplificar el flujo de propinas porque ahí se pierden ingresos.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Un PO exitoso no es el que mete más funcionalidades en un Sprint, es el que descarta las que no aportan valor.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Qué es más difícil: decidir qué construir, o decidir qué NO construir?
              </p>
            </section>
          `
        },
        {
          title: 'Scrum Master: el líder que sirve',
          html: `
            <section class="modal-section">
              <ul>
                <li>No es un asistente administrativo</li>
                <li>Tres frentes: equipo · Product Owner · organización</li>
                <li>Remueve impedimentos, no hace el trabajo técnico</li>
                <li>Su éxito se mide en cuánto el equipo deja de necesitarlo</li>
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Un Scrum Master que escribe las tareas en Jira mientras el equipo mira, está fallando en su propósito.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Cómo se mide el éxito de alguien cuyo objetivo final es volverse innecesario?
              </p>
            </section>
          `
        }
      ];

      function renderSlide() {
        const slide = slides[currentSlide];
        slideTitle.textContent = slide.title;
        slideContent.innerHTML = slide.html;
        prevSlideBtn.hidden = currentSlide === 0;
        nextSlideBtn.disabled = currentSlide === slides.length - 1;
        nextSlideBtn.textContent = currentSlide === slides.length - 1 ? 'Final' : 'Siguiente';
        activityBtn.hidden = currentSlide !== slides.length - 1;
      }

      prevSlideBtn.addEventListener('click', () => {
        currentSlide = Math.max(0, currentSlide - 1);
        renderSlide();
      });

      nextSlideBtn.addEventListener('click', () => {
        currentSlide = Math.min(slides.length - 1, currentSlide + 1);
        renderSlide();
      });

      activityBtn.addEventListener('click', () => {
        window.location.href = 'https://miro.com/app/board/uXjVH6syhgc=/';
      });

      renderSlide();
    </script>
  </body>
</html>
