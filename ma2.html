<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roles - Scrum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="secondary-page">
    <main class="page-shell">
      <section class="page-card">
        <p class="eyebrow">Clase 2</p>
        <h1>Roles - Scrum</h1>

        <div class="slider-shell">
          <h2 id="slideTitle">De roles a accountabilities</h2>
          <div id="slideContent" class="slide-content"></div>
          <div class="slider-nav">
            <button class="section-action-btn" id="prevSlideBtn" type="button" hidden>Anterior</button>
            <button class="section-action-btn" id="nextSlideBtn" type="button">Siguiente</button>
            <button class="section-action-btn" id="activityBtn" type="button" hidden>Actividad</button>
          </div>
        </div>

        <div class="detail-actions">
          <a class="back-link" href="metodologias-agiles.html">← Volver a clases</a>
        </div>
      </section>
    </main>

    <script>
      const slideTitle = document.getElementById('slideTitle');
      const slideContent = document.getElementById('slideContent');
      const prevSlideBtn = document.getElementById('prevSlideBtn');
      const nextSlideBtn = document.getElementById('nextSlideBtn');
      const activityBtn = document.getElementById('activityBtn');
      let currentSlide = 0;

      const slides = [
        {
          title: 'De roles a accountabilities',
          html: `
            <section class="modal-section">
              <ul>
                <li>Scrum Guide 2020: "roles" → "accountabilities"</li>
                <li>No es un título de puesto, es lo que cada persona garantiza</li>
                <li>Scrum Team = unidad autogestionada, sin sub-equipos ni jerarquías</li>
                <li>Deciden internamente quién hace qué, cuándo y cómo</li>
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                El cambio de palabra no es cosmético: pone el foco en la propiedad del resultado, no en el organigrama.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Qué diferencia hay entre tener un título y tener una accountability?
              </p>
            </section>
          `
        },
        {
          title: 'Product Owner: el guardián del valor',
          html: `
            <section class="modal-section">
              <ul>
                <li>No es "tomador de pedidos" ni jefe del equipo técnico</li>
                <li>Misión: maximizar el valor del producto</li>
                <li>Responsable único de ordenar el Product Backlog</li>
                <li>Un buen PO sabe decir que NO</li>
              </ul>
              <p>
                <em>Ejemplo:</em> App de delivery — el equipo quiere mejorar el buscador, el PO prioriza simplificar el flujo de propinas porque ahí se pierden ingresos.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Un PO exitoso no es el que mete más funcionalidades en un Sprint, es el que descarta las que no aportan valor.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Qué es más difícil: decidir qué construir, o decidir qué NO construir?
              </p>
            </section>
          `
        },
        {
          title: 'Scrum Master: el líder que sirve',
          html: `
            <section class="modal-section">
              <ul>
                <li>No es un asistente administrativo</li>
                <li>Tres frentes: equipo · Product Owner · organización</li>
                <li>Remueve impedimentos, no hace el trabajo técnico</li>
                <li>Su éxito se mide en cuánto el equipo deja de necesitarlo</li>
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Un Scrum Master que escribe las tareas en Jira mientras el equipo mira, está fallando en su propósito.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Cómo se mide el éxito de alguien cuyo objetivo final es volverse innecesario?
              </p>
            </section>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MA_posm.png" alt="Imagen MA_posm.png" />
            </div>
          `
        },
        {
          title: 'Developers: los creadores del incremento',
          html: `
            <section class="modal-section">
              <ul>
                <li>Término inclusivo: no solo quienes programan</li>
                <li>UX, QA, analistas de datos también son "Developers"</li>
                <li>Responsables de: Sprint Backlog · Definition of Done · adaptación diaria</li>
                <li>El PO dice el qué, los Developers deciden el cómo y el cuánto</li>
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Nada se entrega si no cumple la Definition of Done acordada por el equipo.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                En su experiencia, ¿quién termina definiendo "cuándo algo está terminado"?
              </p>
            </section>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MA_antipatrones.png" alt="Imagen MS_antipatrones.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MA_conceptos.png" alt="Imagen Conceptos" />
            </div>
          `
        },
        {
          title: 'Sprint Planning: tres preguntas',
          html: `
            <section class="modal-section">
              <ul>
                <li>¿Por qué este Sprint es valioso? (Sprint Goal)</li>
                <li>¿Qué se puede entregar?</li>
                <li>¿Cómo se logrará?</li>
                <li>No es una reunión para "repartir tickets"</li>
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                El agregado del "por qué" en la Scrum Guide 2020 convirtió la planificación en una decisión de valor, no solo de capacidad.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Alguna vez salieron de una planificación sabiendo el qué pero no el por qué?
              </p>
            </section>
          `
        },
        {
          title: 'Sprint Goal: ¿objetivo o inventario?',
          html: `
            <section class="modal-section">
              <ul>
                <li>❌ "Terminar los tickets de la API de pagos"</li>
                <li>✅ "Permitir pago con tarjeta para reducir el abandono del carrito en 15%"</li>
                <li>Un objetivo da dirección cuando algo sale mal; una lista de tareas no</li>
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                Un buen Sprint Goal es una hipótesis de valor medible, no una checklist.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Cómo reescribirían el Sprint Goal de un proyecto reciente si tuvieran que agregarle una métrica?
              </p>
            </section>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MA_velocidad.png" alt="Imagen MS_velocidad.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MA_impedimentos.png" alt="Imagen MS_impedimentos.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MA_casoreal.png" alt="Imagen MS_velocidad.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MA_Zombi.png" alt="Imagen MS_zombi.png" />
            </div>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MA_google.png" alt="Imagen MS_zombi.png" />
            </div>
          `
        },
        {
          title: 'Sprint Review: el producto',
          html: `
            <section class="modal-section">
              <ul>
                <li>Participan: PO, SM, equipo, stakeholders externos</li>
                <li>Objetivo: validar si lo construido genera valor real</li>
                <li>No es demo comercial ni examen</li>
              </ul>
              <p>
                <em>Ejemplo:</em> Plataforma de turnos médicos — stakeholders detectan un formulario con demasiados pasos → cambia el Product Backlog.
              </p>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                La presencia de gente externa es lo que la hace valiosa — permite corregir el rumbo antes de meses de trabajo mal dirigido.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Qué feedback externo cambió alguna vez el rumbo de un proyecto en el que trabajaron?
              </p>
            </section>
          `
        },
        {
          title: 'Sprint Retrospective: el equipo',
          html: `
            <section class="modal-section">
              <ul>
                <li>Participan: PO, SM, Developers — sin stakeholders externos</li>
                <li>Objetivo: mejorar cómo trabaja el equipo</li>
                <li>Errores frecuentes: buscar culpables, hablar sin generar acciones</li>
              </ul>
            </section>

            <section class="modal-section highlight-blue">
              <h3>Punto clave</h3>
              <p>
                La ausencia de gente externa es lo que habilita la honestidad.
              </p>
            </section>

            <section class="modal-section highlight-quote">
              <h3>Pregunta generadora</h3>
              <p>
                ¿Una Retro sin acciones concretas después, sigue siendo una Retro?
              </p>
            </section>
          `
        },
        {
          html: `
            <div class="image-slide">
              <img src="img/MS_comparativa.png" alt="Imagen MS_zombi.png" />
            </div>
          `
        },
          {
          html: `
            <div class="image-slide">
              <img src="img/MA_resumen.png" alt="Imagen MS_zombi.png" />
            </div>
          `
        }
      ];

      function renderSlide() {
        const slide = slides[currentSlide];
        slideTitle.textContent = slide.title;
        slideContent.innerHTML = slide.html;
        prevSlideBtn.hidden = currentSlide === 0;
        nextSlideBtn.disabled = currentSlide === slides.length - 1;
        nextSlideBtn.textContent = currentSlide === slides.length - 1 ? 'Final' : 'Siguiente';
        activityBtn.hidden = currentSlide !== slides.length - 1;
      }

      prevSlideBtn.addEventListener('click', () => {
        currentSlide = Math.max(0, currentSlide - 1);
        renderSlide();
      });

      nextSlideBtn.addEventListener('click', () => {
        currentSlide = Math.min(slides.length - 1, currentSlide + 1);
        renderSlide();
      });

      activityBtn.addEventListener('click', () => {
        window.location.href = 'https://miro.com/app/board/uXjVH6syhgc=/';
      });

      renderSlide();
    </script>
  </body>
</html>
